<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="NDIC Directorate & Regional Offices — Nigeria Deposit Insurance Corporation."
    />
    <title>Directorate &amp; Regional Offices — NDIC</title>
    <link
      rel="shortcut icon"
      href="./assets/images/favicon-01.png"
      type="image/x-icon"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oxygen:wght@400;700&family=Nunito+Sans:wght@400;600;700&family=Palanquin+Dark:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/tailwind.css" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="font-body bg-white text-ndic-text overflow-x-hidden">
    <nav-bar active="about"></nav-bar>

    <main>
      <!-- ── Hero ── -->
      <section
        class="relative overflow-hidden hero-section"
        style="border-radius: 0"
      >
        <img
          src="./assets/images/hero-building.webp"
          alt="NDIC Headquarters Building"
          class="absolute inset-0 w-full h-full object-cover"
        />
        <div
          class="absolute inset-0"
          style="
            background: linear-gradient(
              to right,
              rgba(27, 39, 53, 0.92) 0%,
              rgba(27, 39, 53, 0.55) 55%,
              rgba(27, 39, 53, 0.15) 100%
            );
          "
        ></div>
        <div class="absolute inset-0 flex items-center justify-center px-6">
          <h1
            class="font-heading font-bold text-white text-center"
            style="font-size: clamp(1.4rem, 3.5vw, 3rem); line-height: 1.2"
          >
            ABOUT US: Directorate &amp; Regional Offices
          </h1>
        </div>
      </section>

      <!-- ── Main content ── -->
      <section class="py-12 md:py-16 lg:py-20">
        <div class="ndic-container">
          <div class="flex flex-col md:flex-row gap-8 items-start">
            <!-- Sidebar tabs -->
            <aside class="w-full md:w-64 lg:w-80 flex-shrink-0">
              <div class="dir-sidebar">
                <button
                  id="tab-dept"
                  class="dir-tab dir-tab--active"
                  data-tab="dept"
                >
                  Dept &amp; Directors
                </button>
                <div class="dir-sidebar-divider"></div>
                <button id="tab-zonal" class="dir-tab" data-tab="zonal">
                  Zonal Offices &amp; Controllers
                </button>
              </div>
            </aside>

            <!-- Content panel -->
            <div
              class="flex-1 min-w-0 dir-content-panel"
              style="background: rgba(242, 242, 242, 0.5)"
            >
              <h2
                class="font-heading font-normal text-xl sm:text-2xl md:text-3xl lg:text-4xl xl:text-5xl lg:w-[80%] text-ndic-text mb-4"
              >
                Recognising the contributions of past board members.
              </h2>

              <!-- Search bar -->
              <div class="dir-search-wrap">
                <div class="dir-search-box">
                  <svg
                    class="dir-search-icon"
                    width="18"
                    height="18"
                    viewBox="0 0 22 22"
                    fill="none"
                    xmlns="http://www.w3.org/2000/svg"
                  >
                    <path
                      d="M15.4995 15.5288C15.8395 15.1912 16.3851 15.1912 16.7251 15.5288L18.9722 17.3432H19.0112C19.4656 17.8027 19.4657 18.5479 19.0112 19.0073C18.5567 19.4668 17.8194 19.4667 17.3647 19.0073L15.4995 16.8696C15.3234 16.6921 15.2241 16.4511 15.2241 16.1997C15.2241 15.9481 15.3232 15.7064 15.4995 15.5288ZM9.3042 1.75926C11.3051 1.75926 13.2242 2.56269 14.6392 3.99266C16.0541 5.42279 16.849 7.36274 16.8491 9.38524C16.8491 13.5971 13.4713 17.0122 9.3042 17.0122C5.13723 17.0121 1.75928 13.5971 1.75928 9.38524C1.75946 5.17357 5.13735 1.75938 9.3042 1.75926Z"
                      fill="#2C2E81"
                      fill-opacity="0.5"
                    />
                  </svg>
                  <input
                    id="dir-search"
                    type="text"
                    class="dir-search-input"
                    placeholder="Search..."
                    aria-label="Search"
                  />
                </div>
              </div>

              <!-- Dept & Directors list -->
              <div id="dept-content"></div>

              <!-- Zonal Offices list -->
              <div id="zonal-content" style="display: none"></div>

              <!-- Pagination -->
              <div
                id="dir-pagination"
                class="flex items-center justify-end gap-1 pt-4 mt-2"
              ></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer-bar></footer-bar>

    <script src="./components/components.js"></script>
    <script src="./js/directorate.js"></script>
  </body>
</html>
